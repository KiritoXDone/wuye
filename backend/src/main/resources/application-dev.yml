spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:wuye_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

logging:
  level:
    root: INFO
    com.wuye: INFO

app:
  bootstrap:
    admin:
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:123456}
  auth:
    wechat:
      mode: ${APP_AUTH_WECHAT_MODE:mock}
  jwt:
    secret: ${APP_JWT_SECRET:dev-jwt-secret-for-local-startup-only}
  payment:
    wechat:
      merchant-id: ${APP_PAYMENT_WECHAT_MERCHANT_ID:dev-wechat-merchant}
      callback-secret: ${APP_PAYMENT_WECHAT_CALLBACK_SECRET:dev-wechat-callback-secret}
    alipay:
      merchant-id: ${APP_PAYMENT_ALIPAY_MERCHANT_ID:dev-alipay-merchant}
      callback-secret: ${APP_PAYMENT_ALIPAY_CALLBACK_SECRET:dev-alipay-callback-secret}
  security:
    crypto:
      config-encryption-key: ${APP_SECURITY_CRYPTO_CONFIG_ENCRYPTION_KEY:dev-config-encryption-key}
