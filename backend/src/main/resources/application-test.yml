spring:
  datasource:
    url: jdbc:h2:mem:wuye;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 0

logging:
  level:
    root: WARN
    com.wuye: INFO

app:
  jwt:
    issuer: wuye-backend-test
    secret: test-secret-test-secret-test-secret
    expire-hours: 12
