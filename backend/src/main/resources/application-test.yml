spring:
  datasource:
    url: jdbc:mysql://${MYSQL_TEST_HOST:${MYSQL_HOST:127.0.0.1}}:${MYSQL_TEST_PORT:${MYSQL_PORT:3306}}/${MYSQL_TEST_DB:wuye_system_test}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: ${MYSQL_TEST_USER:${MYSQL_USER:root}}
    password: ${MYSQL_TEST_PASSWORD:${MYSQL_PASSWORD:password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 1s
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest

server:
  port: 0

logging:
  level:
    root: WARN
    com.wuye: INFO

app:
  bootstrap:
    admin:
      username: admin
      password: 123456
  infra:
    redis:
      enabled: false
      key-prefix: 'wuye:test:'
      callback-lock-seconds: 30
    rabbit:
      enabled: false
      payment-exchange: wuye.test.payment.events
      payment-success-routing-key: payment.success
      payment-success-queue: wuye.test.payment.success
      payment-success-dlq: wuye.test.payment.success.dlq
  ai:
    runtime:
      enabled: false
      api-base-url: https://api.openai.com/v1
      provider: openai
      model: gpt-4o-mini
      api-key: ''
      timeout-ms: 30000
      max-tokens: 4096
      temperature: 0.2
  auth:
    wechat:
      mode: mock
      app-id: wx-test-app-id
      app-secret: wx-test-app-secret
      jscode2session-url: https://api.weixin.qq.com/sns/jscode2session
  import-export:
    import-dir: ${java.io.tmpdir}/wuye-import-test
    export-dir: ${java.io.tmpdir}/wuye-export-test
  jwt:
    issuer: wuye-backend-test
    secret: test-secret-test-secret-test-secret
    expire-hours: 12
  payment:
    wechat:
      merchant-id: wx-test-mock-merchant
      callback-secret: wechat-test-callback-secret
    alipay:
      merchant-id: alipay-test-mock-merchant
      callback-secret: alipay-test-callback-secret
  security:
    crypto:
      config-encryption-key: test-config-encryption-key-for-ci
