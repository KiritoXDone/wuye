spring:
  datasource:
    url: jdbc:h2:mem:wuye;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 1s
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest

server:
  port: 0

logging:
  level:
    root: WARN
    com.wuye: INFO

app:
  infra:
    redis:
      enabled: false
      key-prefix: 'wuye:test:'
      callback-lock-seconds: 30
    rabbit:
      enabled: false
      payment-exchange: wuye.test.payment.events
      payment-success-routing-key: payment.success
      payment-success-queue: wuye.test.payment.success
      payment-success-dlq: wuye.test.payment.success.dlq
  ai:
    runtime:
      enabled: false
      api-base-url: https://api.openai.com/v1
      provider: openai
      model: gpt-4o-mini
      api-key: ''
      timeout-ms: 30000
      max-tokens: 4096
      temperature: 0.2
  jwt:
    issuer: wuye-backend-test
    secret: test-secret-test-secret-test-secret
    expire-hours: 12
  payment:
    wechat:
      merchant-id: wx-test-mock-merchant
      callback-secret: wechat-test-callback-secret
    alipay:
      merchant-id: alipay-test-mock-merchant
      callback-secret: alipay-test-callback-secret
